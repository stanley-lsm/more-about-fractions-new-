<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraction Interaction Tool</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .font-mono-numbers {
            font-family: 'ui-monospace', 'Cascadia Code', 'Source Code Pro', Menlo, Monaco, Consolas, monospace;
        }
        .digit-box {
            width: 44px;
            height: 52px;
            border: 2px solid #475569;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 900;
            background: #1e293b;
            color: white;
            transition: all 0.2s;
            cursor: pointer;
            border-radius: 8px;
        }
        .digit-box.active {
            border-color: #facc15;
            background: white;
            color: #0f172a;
            box-shadow: 0 0 12px rgba(250, 204, 21, 0.6);
            transform: scale(1.08);
            z-index: 10;
        }
        .digit-box.disabled {
            cursor: default;
            opacity: 0.8;
        }
        .digit-box.correct {
            border-color: #4ade80;
            background: #f0fdf4;
            color: #166534;
        }
        .div-grid {
            display: grid;
            grid-template-columns: 40px 10px 44px 4px 44px;
            align-items: center;
            justify-items: center;
        }
    </style>
</head>
<body class="bg-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const ChevronUp = (props) => <Icon {...props}><polyline points="18 15 12 9 6 15" /></Icon>;
        const ChevronDown = (props) => <Icon {...props}><polyline points="6 9 12 15 18 9" /></Icon>;
        const RotateCcw = (props) => <Icon {...props}><polyline points="1 4 1 10 7 10" /><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" /></Icon>;
        const ArrowRight = (props) => <Icon {...props}><line x1="5" x2="19" y1="12" y2="12" /><polyline points="12 5 19 12 12 19" /></Icon>;
        const ArrowLeftRight = (props) => <Icon {...props}><polyline points="17 11 21 7 17 3"/><line x1="21" y1="7" x2="9" y2="7"/><polyline points="7 21 3 17 7 13"/><line x1="3" y1="17" x2="15" y2="17"/></Icon>;
        const CheckCircle2 = (props) => <Icon {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></Icon>;
        const Eraser = (props) => <Icon {...props}><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21" /><path d="M22 21H7" /><path d="m5 11 9 9" /></Icon>;

        const App = () => {
            const [mode, setMode] = useState('m2i');
            const [whole, setWhole] = useState(2);
            const [numerator, setNumerator] = useState(5);
            const [denominator, setDenominator] = useState(6);
            
            const [activeStep, setActiveStep] = useState('calc'); 
            const [activeBlank, setActiveBlank] = useState(''); 
            
            const [m2iCalc, setM2iCalc] = useState({ v1_tens: "", v1_units: "", v2_tens: "", v2_units: "", n_tens: "", n_units: "" });
            const [divInputs, setDivInputs] = useState({ q_tens: "", q_units: "", sub_tens: "", sub_units: "", r_tens: "", r_units: "" }); 
            const [stepOneComplete, setStepOneComplete] = useState(false);
            const [finalInputs, setFinalInputs] = useState({ f_tens: "", f_units: "", w_tens: "", w_units: "", n_tens: "", n_units: "", d_tens: "", d_units: "" });

            const [showResult, setShowResult] = useState(false);
            const [feedback, setFeedback] = useState(null);

            const totalParts = (whole * denominator) + numerator;
            const qIsDouble = whole >= 10;
            const subIsDouble = (whole * denominator) >= 10;
            const rIsDouble = numerator >= 10;
            const denomIsDouble = denominator >= 10;
            const partsIsDouble = totalParts >= 10;
            const isDivisible = (totalParts % denominator) === 0;

            const handleClear = () => {
                setM2iCalc({ v1_tens: "", v1_units: "", v2_tens: "", v2_units: "", n_tens: "", n_units: "" });
                setDivInputs({ q_tens: "", q_units: "", sub_tens: "", sub_units: "", r_tens: "", r_units: "" });
                setFinalInputs({ f_tens: "", f_units: "", w_tens: "", w_units: "", n_tens: "", n_units: "", d_tens: "", d_units: "" });
                setStepOneComplete(false);
                setActiveStep('calc');
                setFeedback(null);
                setShowResult(false);
                
                if (mode === 'm2i') {
                    setActiveBlank(denominator >= 10 ? 'v1_tens' : 'v1_units');
                } else {
                    setActiveBlank(whole >= 10 ? 'q_tens' : 'q_units');
                }
            };

            const reset = () => {
                setWhole(2);
                setNumerator(5);
                setDenominator(6);
                handleClear();
            };

            // Keep calculations clean when the problem variables change
            useEffect(() => {
                handleClear();
            }, [whole, numerator, denominator, mode]);

            const handleDenomChange = (delta) => {
                const nextDenom = delta > 0 ? Math.min(12, denominator + 1) : Math.max(2, denominator - 1);
                if (nextDenom === denominator) return;
                
                if (mode === 'i2m') {
                    // Normalizing states in 'i2m' mode ensures totalParts stays robust and division check remains mathematically sound
                    let newTotal = totalParts;
                    if (newTotal < nextDenom) newTotal = nextDenom; // ensures whole remains >= 1
                    setWhole(Math.floor(newTotal / nextDenom));
                    setNumerator(newTotal % nextDenom);
                }
                setDenominator(nextDenom);
            };

            const handleNumberPress = (num) => {
                if (showResult) return;
                
                if (mode === 'm2i') {
                    if (activeStep === 'calc') {
                        setM2iCalc(prev => ({ ...prev, [activeBlank]: String(num) }));
                        const sequence = [];
                        if (denomIsDouble) sequence.push('v1_tens', 'v1_units'); else sequence.push('v1_units');
                        if (qIsDouble) sequence.push('v2_tens', 'v2_units'); else sequence.push('v2_units');
                        if (rIsDouble) sequence.push('n_tens', 'n_units'); else sequence.push('n_units');
                        const idx = sequence.indexOf(activeBlank);
                        if (idx !== -1 && idx < sequence.length - 1) setActiveBlank(sequence[idx+1]);
                    } else {
                        setFinalInputs(prev => ({ ...prev, [activeBlank]: String(num) }));
                        const sequence = [];
                        if (partsIsDouble) sequence.push('f_tens', 'f_units'); else sequence.push('f_units');
                        const idx = sequence.indexOf(activeBlank);
                        if (idx !== -1 && idx < sequence.length - 1) setActiveBlank(sequence[idx+1]);
                    }
                } else {
                    if (!stepOneComplete) {
                        setDivInputs(prev => ({ ...prev, [activeBlank]: String(num) }));
                        const sequence = [];
                        if (qIsDouble) sequence.push('q_tens', 'q_units'); else sequence.push('q_units');
                        if (subIsDouble) sequence.push('sub_tens', 'sub_units'); else sequence.push('sub_units');
                        if (!isDivisible) {
                            if (rIsDouble) sequence.push('r_tens', 'r_units'); else sequence.push('r_units');
                        }
                        const idx = sequence.indexOf(activeBlank);
                        if (idx !== -1 && idx < sequence.length - 1) setActiveBlank(sequence[idx+1]);
                    } else {
                        setFinalInputs(prev => ({ ...prev, [activeBlank]: String(num) }));
                        const sequence = [];
                        if (qIsDouble) sequence.push('w_tens', 'w_units'); else sequence.push('w_units');
                        if (!isDivisible) {
                            if (rIsDouble) sequence.push('n_tens', 'n_units'); else sequence.push('n_units');
                            if (denomIsDouble) sequence.push('d_tens', 'd_units'); else sequence.push('d_units');
                        }
                        const idx = sequence.indexOf(activeBlank);
                        if (idx !== -1 && idx < sequence.length - 1) setActiveBlank(sequence[idx+1]);
                    }
                }
            };

            const backspaceInput = () => {
                if (showResult) return;
                const setTarget = mode === 'm2i' ? (activeStep === 'calc' ? setM2iCalc : setFinalInputs) : (stepOneComplete ? setFinalInputs : setDivInputs);
                setTarget(prev => ({ ...prev, [activeBlank]: "" }));
            };

            const checkStepOne = () => {
                if (mode === 'm2i') {
                    const v1 = parseInt((m2iCalc.v1_tens || "") + (m2iCalc.v1_units || "0"));
                    const v2 = parseInt((m2iCalc.v2_tens || "") + (m2iCalc.v2_units || "0"));
                    const n = parseInt((m2iCalc.n_tens || "") + (m2iCalc.n_units || "0"));
                    const multiplicationValid = (v1 === denominator && v2 === whole) || (v1 === whole && v2 === denominator);
                    const numeratorValid = n === numerator;
                    if (multiplicationValid && numeratorValid) {
                        setFeedback('correct');
                        setTimeout(() => { 
                            setFeedback(null); 
                            setStepOneComplete(true);
                            setActiveStep('final'); 
                            setActiveBlank(partsIsDouble ? 'f_tens' : 'f_units'); 
                        }, 600);
                    } else {
                        setFeedback('wrong');
                        setTimeout(() => setFeedback(null), 800);
                    }
                } else {
                    const q = parseInt((divInputs.q_tens || "") + (divInputs.q_units || "0"));
                    const sub = parseInt((divInputs.sub_tens || "") + (divInputs.sub_units || "0"));
                    const r = isDivisible ? 0 : parseInt((divInputs.r_tens || "") + (divInputs.r_units || "0"));
                    if (q === whole && sub === (whole * denominator) && r === numerator) {
                        setFeedback('correct');
                        setTimeout(() => { 
                            setFeedback(null); 
                            setStepOneComplete(true); 
                            setActiveBlank(qIsDouble ? 'w_tens' : 'w_units'); 
                        }, 600);
                    } else {
                        setFeedback('wrong');
                        setTimeout(() => setFeedback(null), 800);
                    }
                }
            };

            const checkFinal = () => {
                if (mode === 'm2i') {
                    const val = parseInt((finalInputs.f_tens || "") + (finalInputs.f_units || "0"));
                    if (val === totalParts) {
                        setFeedback('correct');
                        setShowResult(true);
                    } else {
                        setFeedback('wrong');
                        setTimeout(() => setFeedback(null), 800);
                    }
                } else {
                    const wVal = parseInt((finalInputs.w_tens || "") + (finalInputs.w_units || "0"));
                    if (isDivisible) {
                        if (wVal === whole) { setFeedback('correct'); setShowResult(true); }
                        else { setFeedback('wrong'); setTimeout(() => setFeedback(null), 800); }
                    } else {
                        const nVal = parseInt((finalInputs.n_tens || "") + (finalInputs.n_units || "0"));
                        const dVal = parseInt((finalInputs.d_tens || "") + (finalInputs.d_units || "0"));
                        if (wVal === whole && nVal === numerator && dVal === denominator) {
                            setFeedback('correct');
                            setShowResult(true);
                        } else {
                            setFeedback('wrong');
                            setTimeout(() => setFeedback(null), 800);
                        }
                    }
                }
            };

            const FractionCircle = ({ fillPercent, size = 100 }) => {
                const radius = 40;
                const circumference = 2 * Math.PI * radius;
                const offset = circumference - (Math.min(100, fillPercent) / 100) * circumference;
                return (
                    <div className="relative flex flex-col items-center transition-transform hover:scale-105">
                        <svg width={size} height={size} viewBox="0 0 100 100" className="transform -rotate-90 drop-shadow-md">
                            <circle cx="50" cy="50" r={radius} fill="white" stroke="#e2e8f0" strokeWidth="8" />
                            <circle cx="50" cy="50" r={radius} fill="transparent" stroke={fillPercent >= 100 ? "#be185d" : "#1d4ed8"} strokeWidth="8" strokeDasharray={circumference} strokeDashoffset={offset} strokeLinecap="round" className="transition-all duration-500 ease-out" />
                            {[...Array(denominator)].map((_, i) => (
                                <line key={i} x1="50" y1="50" x2={50 + radius * Math.cos((2 * Math.PI * i) / denominator)} y2={50 + radius * Math.sin((2 * Math.PI * i) / denominator)} stroke="#94a3b8" strokeWidth="1.5" />
                            ))}
                        </svg>
                    </div>
                );
            };

            const DigitBox = ({ id, value, disabled }) => (
                <div 
                    onClick={() => !disabled && setActiveBlank(id)}
                    className={`digit-box font-mono-numbers ${activeBlank === id ? 'active' : ''} ${disabled ? 'disabled' : ''} ${showResult ? 'correct' : ''}`}
                >
                    {value}
                </div>
            );

            const partsStr = String(totalParts).padStart(2, ' ');
            const tensDigit = partsStr[0] === ' ' ? '' : partsStr[0];
            const unitsDigit = partsStr[1];

            return (
                <div className="min-h-screen bg-slate-200 p-4 md:p-8 font-sans text-slate-900">
                    <div className="max-w-6xl mx-auto bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border-[12px] border-slate-800">
                        <div className="bg-slate-900 p-6 flex justify-between items-center border-b-8 border-yellow-400">
                            <div className="flex items-center gap-6">
                                <h1 className="text-3xl font-black uppercase tracking-tighter text-yellow-400 italic">Fraction Master</h1>
                                <button onClick={() => setMode(mode === 'm2i' ? 'i2m' : 'm2i')} className="flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-xl font-black text-sm hover:bg-blue-500 transition-all border-b-4 border-blue-800 active:border-b-0 translate-y-[-2px] active:translate-y-0">
                                    <ArrowLeftRight size={18} />
                                    {mode === 'm2i' ? 'To Mixed → Improper' : 'To Improper → Mixed'}
                                </button>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={handleClear} className="p-3 bg-slate-700 rounded-2xl shadow-lg hover:bg-slate-600 active:scale-90 transition-all text-white border-b-4 border-slate-900">
                                    <Eraser size={28} />
                                </button>
                                <button onClick={reset} className="p-3 bg-yellow-400 rounded-2xl shadow-lg hover:bg-yellow-300 active:scale-90 transition-all text-slate-900 border-b-4 border-yellow-600">
                                    <RotateCcw size={28} />
                                </button>
                            </div>
                        </div>

                        <div className="p-6 md:p-10 grid grid-cols-1 lg:grid-cols-12 gap-10">
                            <div className="lg:col-span-6 space-y-6">
                                <div className="bg-slate-900 rounded-[2rem] p-6 text-white shadow-xl border-b-8 border-blue-600">
                                    <h2 className="text-lg font-black mb-4 flex items-center gap-2 text-blue-400 uppercase">
                                        {mode === 'm2i' ? '1. Set Mixed Number' : '1. Set Improper Fraction'}
                                    </h2>
                                    <div className="flex items-center justify-around bg-slate-800 rounded-2xl p-6">
                                        {mode === 'm2i' ? (
                                            <>
                                                <div className="flex flex-col items-center">
                                                    <button onClick={() => setWhole(Math.max(1, whole + 1))} className="text-blue-400"><ChevronUp /></button>
                                                    <div className="text-7xl font-black text-white">{whole}</div>
                                                    <button onClick={() => setWhole(Math.max(1, whole - 1))} className="text-blue-400"><ChevronDown /></button>
                                                </div>
                                                <div className="flex flex-col items-center px-4">
                                                    <button onClick={() => setNumerator(Math.max(1, numerator + 1))} className="text-blue-400"><ChevronUp /></button>
                                                    <div className="text-5xl font-black border-b-4 border-white pb-1 w-16 text-center">{numerator}</div>
                                                    <div className="text-5xl font-black pt-1 w-16 text-center">{denominator}</div>
                                                    <button onClick={() => setNumerator(Math.max(1, numerator - 1))} className="text-blue-400"><ChevronDown /></button>
                                                </div>
                                            </>
                                        ) : (
                                            <div className="flex flex-col items-center">
                                                <button onClick={() => {
                                                    const nextNum = totalParts + 1;
                                                    setWhole(Math.floor(nextNum / denominator));
                                                    setNumerator(nextNum % denominator);
                                                }} className="text-blue-400"><ChevronUp /></button>
                                                <div className="text-7xl font-black text-white border-b-4 border-white pb-1 w-24 text-center">{totalParts}</div>
                                                <div className="text-7xl font-black pt-1 w-24 text-center">{denominator}</div>
                                                <button onClick={() => {
                                                    const nextNum = Math.max(denominator, totalParts - 1); // ensures whole >= 1
                                                    setWhole(Math.floor(nextNum / denominator));
                                                    setNumerator(nextNum % denominator);
                                                }} className="text-blue-400"><ChevronDown /></button>
                                            </div>
                                        )}
                                        <div className="bg-slate-700 p-4 rounded-2xl text-center border-2 border-slate-600">
                                            <span className="text-[10px] font-black text-blue-300 uppercase block mb-1">Slices</span>
                                            <button onClick={() => handleDenomChange(1)} className="text-white"><ChevronUp /></button>
                                            <div className="text-3xl font-black text-yellow-400">{denominator}</div>
                                            <button onClick={() => handleDenomChange(-1)} className="text-white"><ChevronDown /></button>
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-white border-4 border-slate-200 rounded-[2rem] p-8 min-h-[220px] flex flex-wrap items-center justify-center gap-4 shadow-inner">
                                    {[...Array(whole)].map((_, i) => <FractionCircle key={i} fillPercent={100} />)}
                                    {numerator > 0 && <FractionCircle fillPercent={(numerator / denominator) * 100} />}
                                </div>
                            </div>

                            <div className="lg:col-span-6 flex flex-col gap-6">
                                <div className={`p-8 rounded-[2.5rem] transition-all duration-300 border-8 shadow-2xl ${feedback === 'correct' ? 'bg-green-600 border-green-400' : feedback === 'wrong' ? 'bg-red-600 border-red-400' : 'bg-slate-900 border-slate-700'}`}>
                                    {mode === 'm2i' ? (
                                        <>
                                            <div className={`transition-all ${activeStep === 'calc' ? 'opacity-100' : 'opacity-20 pointer-events-none'}`}>
                                                <h3 className="text-yellow-400 text-sm font-black uppercase mb-10 text-center tracking-widest underline underline-offset-8">Step 1: Multiply & Add</h3>
                                                <div className="flex items-center justify-center gap-2 text-white font-black text-3xl">
                                                    <span className="text-slate-400 text-4xl">(</span>
                                                    <div className="flex gap-1">
                                                        {denomIsDouble && <DigitBox id="v1_tens" value={m2iCalc.v1_tens} disabled={stepOneComplete} />}
                                                        <DigitBox id="v1_units" value={m2iCalc.v1_units} disabled={stepOneComplete} />
                                                    </div>
                                                    <span className="text-yellow-400 mx-1">×</span>
                                                    <div className="flex gap-1">
                                                        {qIsDouble && <DigitBox id="v2_tens" value={m2iCalc.v2_tens} disabled={stepOneComplete} />}
                                                        <DigitBox id="v2_units" value={m2iCalc.v2_units} disabled={stepOneComplete} />
                                                    </div>
                                                    <span className="text-slate-400 text-4xl mr-1">)</span>
                                                    <span className="text-yellow-400 mr-1">+</span>
                                                    <div className="flex gap-1">
                                                        {rIsDouble && <DigitBox id="n_tens" value={m2iCalc.n_tens} disabled={stepOneComplete} />}
                                                        <DigitBox id="n_units" value={m2iCalc.n_units} disabled={stepOneComplete} />
                                                    </div>
                                                </div>
                                                {!stepOneComplete && (
                                                    <button onClick={checkStepOne} className="w-full mt-10 py-4 bg-yellow-400 text-slate-900 font-black rounded-2xl hover:bg-yellow-300 shadow-xl flex items-center justify-center gap-3 uppercase tracking-tighter">Check Step 1 <ArrowRight size={22} /></button>
                                                )}
                                            </div>
                                            {stepOneComplete && (
                                                <div className="mt-8 pt-8 border-t border-slate-700 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                                    <h3 className="text-white text-sm font-black uppercase mb-6 text-center tracking-widest">Step 2: Improper Fraction</h3>
                                                    <div className="flex flex-col items-center">
                                                        <div className="flex gap-1">
                                                            {partsIsDouble && <DigitBox id="f_tens" value={finalInputs.f_tens} disabled={showResult} />}
                                                            <DigitBox id="f_units" value={finalInputs.f_units} disabled={showResult} />
                                                        </div>
                                                        <div className="w-24 h-1.5 bg-slate-600 my-4 rounded-full" />
                                                        <div className="text-4xl font-black text-slate-400 font-mono-numbers">{denominator}</div>
                                                        {!showResult && (
                                                            <button onClick={checkFinal} className="w-full mt-8 py-4 bg-green-400 text-slate-900 font-black rounded-2xl hover:bg-green-300 shadow-xl uppercase tracking-widest">Finish Conversion</button>
                                                        )}
                                                    </div>
                                                </div>
                                            )}
                                        </>
                                    ) : (
                                        <div className="flex flex-col items-center">
                                            <h3 className="text-yellow-400 text-sm font-black uppercase mb-8 text-center tracking-widest underline underline-offset-8">Step 1: Column Division</h3>
                                            <div className={`relative mb-8 transition-all ${stepOneComplete ? 'opacity-40 grayscale pointer-events-none' : 'opacity-100'}`}>
                                                <div className="div-grid gap-y-3">
                                                    <div className="col-start-3 flex justify-center">
                                                        {qIsDouble && <DigitBox id="q_tens" value={divInputs.q_tens} disabled={stepOneComplete} />}
                                                    </div>
                                                    <div className="col-start-5 flex justify-center">
                                                        <DigitBox id="q_units" value={divInputs.q_units} disabled={stepOneComplete} />
                                                    </div>
                                                    <div className="col-start-1 text-right text-4xl font-black text-slate-400 pr-2 self-end pb-2">{denominator}</div>
                                                    <div className="col-start-2 col-span-4 h-full border-l-4 border-t-4 border-white rounded-tl-3xl px-1 pt-3 pb-2 flex items-center">
                                                        <div className="grid grid-cols-2 gap-x-4 w-full px-2">
                                                            <span className="text-4xl font-black text-white font-mono-numbers text-center">{tensDigit || '\u00A0'}</span>
                                                            <span className="text-4xl font-black text-white font-mono-numbers text-center">{unitsDigit}</span>
                                                        </div>
                                                    </div>
                                                    <div className="col-start-1 text-right text-3xl font-bold text-slate-500 pr-2">−</div>
                                                    <div className="col-start-3 flex justify-center">
                                                        {subIsDouble && <DigitBox id="sub_tens" value={divInputs.sub_tens} disabled={stepOneComplete} />}
                                                    </div>
                                                    <div className="col-start-5 flex justify-center">
                                                        <DigitBox id="sub_units" value={divInputs.sub_units} disabled={stepOneComplete} />
                                                    </div>
                                                    <div className="col-start-2 col-span-4 h-1.5 bg-slate-500/50 rounded-full w-full" />
                                                    <div className="col-start-1"></div>
                                                    {!isDivisible ? (
                                                        <>
                                                            <div className="col-start-3 flex justify-center">
                                                                {rIsDouble && <DigitBox id="r_tens" value={divInputs.r_tens} disabled={stepOneComplete} />}
                                                            </div>
                                                            <div className="col-start-5 flex justify-center">
                                                                <DigitBox id="r_units" value={divInputs.r_units} disabled={stepOneComplete} />
                                                            </div>
                                                        </>
                                                    ) : (
                                                        <div className="col-start-5 text-4xl font-black text-green-400 font-mono-numbers">0</div>
                                                    )}
                                                </div>
                                            </div>
                                            {!stepOneComplete ? (
                                                <button onClick={checkStepOne} className="w-full py-4 bg-yellow-400 text-slate-900 font-black rounded-2xl hover:bg-yellow-300 shadow-xl flex items-center justify-center gap-3 text-lg uppercase tracking-tighter">Check Division</button>
                                            ) : (
                                                <div className={`w-full mt-4 p-8 rounded-[2.5rem] border-4 transition-all animate-in fade-in zoom-in-95 duration-500 ${showResult ? 'bg-green-600 border-green-400' : 'bg-slate-800 border-slate-600 shadow-inner'}`}>
                                                    <h3 className="text-white text-xs font-black uppercase mb-10 text-center tracking-[0.2em] opacity-80 underline underline-offset-4">Step 2: Assemble {isDivisible ? 'Whole' : 'Mixed'} Number</h3>
                                                    <div className="flex items-center justify-center gap-6">
                                                        <div className="flex gap-1">
                                                            {qIsDouble && <DigitBox id="w_tens" value={finalInputs.w_tens} disabled={showResult} />}
                                                            <DigitBox id="w_units" value={finalInputs.w_units} disabled={showResult} />
                                                        </div>
                                                        {!isDivisible && (
                                                            <div className="flex flex-col items-center">
                                                                <div className="flex gap-1">
                                                                    {rIsDouble && <DigitBox id="n_tens" value={finalInputs.n_tens} disabled={showResult} />}
                                                                    <DigitBox id="n_units" value={finalInputs.n_units} disabled={showResult} />
                                                                </div>
                                                                <div className="w-16 h-1.5 bg-slate-600 my-3 rounded-full" />
                                                                <div className="flex gap-1">
                                                                    {denomIsDouble && <DigitBox id="d_tens" value={finalInputs.d_tens} disabled={showResult} />}
                                                                    <DigitBox id="d_units" value={finalInputs.d_units} disabled={showResult} />
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>
                                                    {!showResult && (
                                                        <button onClick={checkFinal} className="w-full mt-10 py-4 bg-green-400 text-slate-900 font-black rounded-2xl hover:bg-green-300 shadow-xl flex items-center justify-center gap-2 uppercase tracking-widest">Check Answer <CheckCircle2 size={20} /></button>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                                <div className="bg-slate-900 rounded-[2rem] border-4 border-slate-700 p-5 shadow-2xl">
                                    <div className="grid grid-cols-3 gap-3">
                                        {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(num => (
                                            <button key={num} onClick={() => handleNumberPress(num)} className="h-16 bg-slate-800 hover:bg-slate-700 text-white text-3xl font-black rounded-2xl border-b-8 border-slate-950 active:border-b-0 active:translate-y-2 transition-all">{num}</button>
                                        ))}
                                        <button onClick={backspaceInput} className="h-16 bg-red-900/40 text-red-400 font-black rounded-2xl border-b-8 border-red-950 text-sm uppercase flex items-center justify-center gap-1">Delete</button>
                                        <button onClick={() => handleNumberPress(0)} className="h-16 bg-slate-800 text-white text-3xl font-black rounded-2xl border-b-8 border-slate-950">0</button>
                                        <button onClick={handleClear} className="h-16 bg-blue-900/40 text-blue-400 font-black rounded-2xl border-b-8 border-blue-950 text-xs uppercase flex items-center justify-center">Clear</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
